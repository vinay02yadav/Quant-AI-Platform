<svg width="1800" height="900" viewBox="0 0 1800 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .header { fill: #0f172a; }
      .header-line { stroke: #38bdf8; stroke-width: 3; opacity: 0.85; }
      .title { fill: #ffffff; font: 700 42px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #cbd5e1; font: 400 20px Arial, Helvetica, sans-serif; }
      .section { fill: #334155; font: 700 14px Arial, Helvetica, sans-serif; letter-spacing: 0.6px; }
      .card-title { fill: #0f172a; font: 700 23px Arial, Helvetica, sans-serif; }
      .card-text { fill: #334155; font: 400 16.5px Arial, Helvetica, sans-serif; }
      .chip-text { fill: #ffffff; font: 700 13px Arial, Helvetica, sans-serif; }
      .time-text { fill: #ffffff; font: 700 14px Arial, Helvetica, sans-serif; }
      .step { fill: #ffffff; font: 700 18px Arial, Helvetica, sans-serif; }
      .arrow-label { fill: #64748b; font: 700 13px Arial, Helvetica, sans-serif; }
      .aws { fill: #fff7ed; stroke: #f97316; stroke-width: 2.4; }
      .gcp { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.4; }
      .kafka { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.4; }
      .ml { fill: #fff1f2; stroke: #e11d48; stroke-width: 2.4; }
      .db { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.4; }
      .ui { fill: #faf5ff; stroke: #9333ea; stroke-width: 2.4; }
      .aws-fill { fill: #ea580c; }
      .gcp-fill { fill: #2563eb; }
      .kafka-fill { fill: #7c3aed; }
      .ml-fill { fill: #e11d48; }
      .db-fill { fill: #16a34a; }
      .ui-fill { fill: #9333ea; }
      .arrow { stroke: #0891b2; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 3.5; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 9 9; }
      .divider { stroke: #cbd5e1; stroke-width: 1.2; }
      .shadow { filter: url(#shadow); }
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2 L14 8 L2 14 Z" fill="#0891b2"/>
    </marker>
    <marker id="arrowSoft" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2 L14 8 L2 14 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-18%" y="-20%" width="136%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#e2e8f0" stroke-width="1" opacity="0.32"/>
    </pattern>
  </defs>

  <rect class="bg" width="1800" height="900"/>
  <rect width="1800" height="900" fill="url(#grid)"/>

  <rect x="70" y="38" width="1660" height="132" rx="28" class="header"/>
  <line x1="112" y1="168" x2="1690" y2="168" class="header-line"/>
  <text x="112" y="90" class="title">Quant AI Platform - Current Production Architecture</text>
  <text x="112" y="128" class="subtitle">GCP only listens first at 9:29 PM. AWS independently publishes at 9:30 PM. GCP processes the stream and writes results back to AWS PostgreSQL.</text>

  <text x="100" y="214" class="section">SCHEDULED TRIGGERS</text>
  <line x1="100" y1="228" x2="1650" y2="228" class="divider"/>

  <text x="100" y="429" class="section">STREAMING AND PROCESSING</text>
  <line x1="100" y1="443" x2="1650" y2="443" class="divider"/>

  <text x="100" y="644" class="section">MODEL, STORAGE, AND DASHBOARD</text>
  <line x1="100" y1="658" x2="1650" y2="658" class="divider"/>

  <!-- Row 1 -->
  <rect x="100" y="245" width="430" height="145" rx="20" class="gcp shadow"/>
  <rect x="130" y="268" width="44" height="34" rx="17" class="gcp-fill"/>
  <text x="142" y="291" class="step">1</text>
  <rect x="188" y="268" width="96" height="34" rx="17" class="gcp-fill"/>
  <text x="206" y="291" class="time-text">9:29 PM</text>
  <rect x="130" y="316" width="70" height="25" rx="12.5" class="gcp-fill"/>
  <text x="148" y="334" class="chip-text">GCP</text>
  <text x="218" y="337" class="card-title">Cron Starts Listener</text>
  <text x="130" y="365" class="card-text">Starts a listen-only Kafka consumer and</text>
  <text x="130" y="386" class="card-text">waits before any AWS data arrives.</text>

  <rect x="665" y="245" width="430" height="145" rx="20" class="aws shadow"/>
  <rect x="695" y="268" width="44" height="34" rx="17" class="aws-fill"/>
  <text x="707" y="291" class="step">2</text>
  <rect x="753" y="268" width="96" height="34" rx="17" class="aws-fill"/>
  <text x="771" y="291" class="time-text">9:30 PM</text>
  <rect x="695" y="316" width="70" height="25" rx="12.5" class="aws-fill"/>
  <text x="715" y="334" class="chip-text">AWS</text>
  <text x="783" y="337" class="card-title">Cron Starts Producer</text>
  <text x="695" y="365" class="card-text">Runs independently on the AWS server.</text>
  <text x="695" y="386" class="card-text">It is not triggered by GCP.</text>

  <rect x="1230" y="245" width="430" height="145" rx="20" class="aws shadow"/>
  <rect x="1260" y="268" width="44" height="34" rx="17" class="aws-fill"/>
  <text x="1272" y="291" class="step">3</text>
  <rect x="1260" y="316" width="70" height="25" rx="12.5" class="aws-fill"/>
  <text x="1280" y="334" class="chip-text">AWS</text>
  <text x="1348" y="337" class="card-title">Fetch + Produce Data</text>
  <text x="1260" y="365" class="card-text">Fetches following-session stocks, macro</text>
  <text x="1260" y="386" class="card-text">data, and market news headlines.</text>

  <!-- Row 2 -->
  <rect x="1230" y="460" width="430" height="145" rx="20" class="kafka shadow"/>
  <rect x="1260" y="483" width="44" height="34" rx="17" class="kafka-fill"/>
  <text x="1272" y="506" class="step">4</text>
  <rect x="1260" y="531" width="85" height="25" rx="12.5" class="kafka-fill"/>
  <text x="1278" y="549" class="chip-text">KAFKA</text>
  <text x="1363" y="552" class="card-title">market_data_stream</text>
  <text x="1260" y="580" class="card-text">AWS publishes records to the Kafka topic.</text>
  <text x="1260" y="601" class="card-text">Kafka buffers the stream for GCP.</text>

  <rect x="665" y="460" width="430" height="145" rx="20" class="gcp shadow"/>
  <rect x="695" y="483" width="44" height="34" rx="17" class="gcp-fill"/>
  <text x="707" y="506" class="step">5</text>
  <rect x="695" y="531" width="70" height="25" rx="12.5" class="gcp-fill"/>
  <text x="713" y="549" class="chip-text">GCP</text>
  <text x="783" y="552" class="card-title">Consume + Enrich</text>
  <text x="695" y="580" class="card-text">Pulls Kafka records and adds AI sentiment</text>
  <text x="695" y="601" class="card-text">signals plus short news summaries.</text>

  <rect x="100" y="460" width="430" height="145" rx="20" class="gcp shadow"/>
  <rect x="130" y="483" width="44" height="34" rx="17" class="gcp-fill"/>
  <text x="142" y="506" class="step">6</text>
  <rect x="130" y="531" width="70" height="25" rx="12.5" class="gcp-fill"/>
  <text x="148" y="549" class="chip-text">GCP</text>
  <text x="218" y="552" class="card-title">Feature Engineering</text>
  <text x="130" y="580" class="card-text">Builds technical, macro, rolling, regime,</text>
  <text x="130" y="601" class="card-text">and sentiment features for inference.</text>

  <!-- Row 3 -->
  <rect x="100" y="675" width="430" height="145" rx="20" class="ml shadow"/>
  <rect x="130" y="698" width="44" height="34" rx="17" class="ml-fill"/>
  <text x="142" y="721" class="step">7</text>
  <rect x="130" y="746" width="70" height="25" rx="12.5" class="ml-fill"/>
  <text x="151" y="764" class="chip-text">ML</text>
  <text x="218" y="767" class="card-title">LightGBM Inference</text>
  <text x="130" y="795" class="card-text">Predicts final market signals for 1-day,</text>
  <text x="130" y="816" class="card-text">3-day, and 5-day horizons.</text>

  <rect x="665" y="675" width="430" height="145" rx="20" class="db shadow"/>
  <rect x="695" y="698" width="44" height="34" rx="17" class="db-fill"/>
  <text x="707" y="721" class="step">8</text>
  <rect x="695" y="746" width="70" height="25" rx="12.5" class="db-fill"/>
  <text x="713" y="764" class="chip-text">AWS</text>
  <text x="783" y="767" class="card-title">PostgreSQL</text>
  <text x="695" y="795" class="card-text">Stores raw_market_data, deployment_dataset,</text>
  <text x="695" y="816" class="card-text">and daily_signals for downstream reads.</text>

  <rect x="1230" y="675" width="430" height="145" rx="20" class="ui shadow"/>
  <rect x="1260" y="698" width="44" height="34" rx="17" class="ui-fill"/>
  <text x="1272" y="721" class="step">9</text>
  <rect x="1260" y="746" width="70" height="25" rx="12.5" class="ui-fill"/>
  <text x="1281" y="764" class="chip-text">UI</text>
  <text x="1348" y="767" class="card-title">Frontend Dashboard</text>
  <text x="1260" y="795" class="card-text">Reads the latest saved PostgreSQL signals</text>
  <text x="1260" y="816" class="card-text">through the app/API layer.</text>

  <!-- Flow arrows -->
  <path d="M530 318 H665" class="arrow-soft"/>
  <text x="555" y="304" class="arrow-label">one minute later</text>
  <path d="M1095 318 H1230" class="arrow"/>
  <path d="M1445 390 V460" class="arrow"/>
  <path d="M1230 532.5 H1095" class="arrow"/>
  <path d="M665 532.5 H530" class="arrow"/>
  <path d="M315 605 V675" class="arrow"/>
  <path d="M530 747.5 H665" class="arrow"/>
  <path d="M1095 747.5 H1230" class="arrow"/>
</svg>
